<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardwarePOS Pro</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="header">
    <h1>HardwarePOS Pro</h1>
    <p>Smart Inventory & Sales System</p>
</header>

<nav class="navbar">
    <h2>🛠 HardwarePOS Pro</h2>

    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">Products</a>
        <a href="#">Sales</a>
        <a href="#">Reports</a>
    </div>
</nav>


<main>
    <section class="dashboard">
      <section class="product-form">

    <h2>Add Product</h2>

    <form id="productForm">

        <input
            type="text"
            id="productName"
            placeholder="Product Name"
            required
        >

        <input
            type="number"
            id="productPrice"
            placeholder="Price"
            required
        >

        <input
            type="number"
            id="productStock"
            placeholder="Stock Quantity"
            required
        >

        <button type="submit">
            Add Product
        </button>

    </form>

</section>
      <section>
        
<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search products..."
    >

</section>
    <table id="productTable">

        <thead>

            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</section>

      <section class="sales-section">

    <h2>Record Sale</h2>

    <form id="salesForm">

        <select id="saleProduct" required>

            <option value="">
                Select Product
            </option>

        </select>

        <input
            type="number"
            id="saleQuantity"
            placeholder="Quantity"
            min="1"
            required
        >

        <button type="submit">
            Sell Product
        </button>

    </form>
        <section class="sales-history">

    <h2>Sales History</h2>

    <table id="salesTable">

        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

</section>

</section>

        <div class="card">
            <h3>Total Products</h3>
            <h1 id="productCount">0</h1>
        </div>

        <div class="card">
            <h3>Total Sales</h3>
            <h1 id="salesCount">0</h1>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h1>KSh <span id="revenue">0</span></h1>
        </div>

        <div class="card">
            <h3>Low Stock</h3>
            <h1 id="lowStock">0</h1>
        </div>

    </section>

</>

</>

<script src="assets/js/storage.js"></script>
<script src="assets/js/products.js"></script>
<script src="assets/js/sales.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/dashboard.js"></script>

</body>
</html>
